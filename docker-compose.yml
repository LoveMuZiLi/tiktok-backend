services:
  mysql:
    image: mysql:8.0
    container_name: tiktok-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: tiktok
      MYSQL_DATABASE: tiktok
      MYSQL_USER: tiktok
      MYSQL_PASSWORD: tiktok
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ptiktok"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
